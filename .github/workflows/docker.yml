name: Docker

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from pyproject.toml
        id: check
        run: |
          VERSION=$(python3 -c "
          import re
          with open('pyproject.toml') as f:
              content = f.read()
          match = re.search(r'version\s*=\s*\"([^\"]+)\"', content)
          print(match.group(1))
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Check if this image tag already exists in ghcr.io with all platforms
          # Always publish on workflow_dispatch to allow forced rebuilds
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger — force publish"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          elif docker manifest inspect ghcr.io/${{ github.repository }}:$VERSION >/dev/null 2>&1; then
            echo "Image tag $VERSION already exists, skipping publish"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version $VERSION detected"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: check-version
    if: needs.check-version.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for multi-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.check-version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
