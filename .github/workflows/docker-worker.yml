name: Docker Worker

on:
  pull_request:
    branches: [main]
    paths:
      - 'docker/Dockerfile.worker'
      - 'src/**'
      - 'pyproject.toml'
      - 'README.md'
      - '.github/workflows/docker-worker.yml'
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'docker/Dockerfile.worker'
      - 'src/**'
      - 'pyproject.toml'
      - 'README.md'
      - '.github/workflows/docker-worker.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-worker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Get package version
        id: version
        run: |
          VERSION=$(python3 - <<'PY'
          import re
          from pathlib import Path

          content = Path('pyproject.toml').read_text(encoding='utf-8')
          match = re.search(r'^version\s*=\s*"([^"]+)"', content, re.MULTILINE)
          if not match:
              raise SystemExit('Could not find project.version in pyproject.toml')
          print(match.group(1))
          PY
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-worker
          tags: |
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ github.event_name != 'pull_request' }}
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=ref,event=pr
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=Seeknal Worker
            org.opencontainers.image.description=Seeknal Ask Temporal worker

      - name: Build and publish worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.worker
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=seeknal-worker
          cache-to: type=gha,mode=max,scope=seeknal-worker
