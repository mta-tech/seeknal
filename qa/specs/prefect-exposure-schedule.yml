name: prefect-exposure-schedule
description: >
  Test Prefect report exposure scheduling integration. Validates:
  schedule field in exposure YAML (cron + timezone), save_report_exposure
  tool with schedule parameter, exposure validation rules, and the
  deploy_exposure() API path. No external infrastructure needed.
source_type: csv

infrastructure:
  requires: []

seed_data:
  raw_sales.csv: |
    sale_id,region,amount,sale_date
    S001,north,1200.00,2026-01-15
    S002,south,850.00,2026-01-16
    S003,north,2100.00,2026-01-17
    S004,east,430.00,2026-01-18
    S005,west,1750.00,2026-01-19
    S006,south,990.00,2026-01-20
    S007,north,1500.00,2026-01-21
    S008,east,620.00,2026-01-22

pipeline:
  bronze:
    - kind: source
      name: raw_sales
      source: csv
      table: "data/raw_sales.csv"
      description: Raw sales data
      tags: ["bronze", "sales"]

  silver:
    - kind: transform
      name: regional_revenue
      description: Revenue aggregated by region
      inputs:
        - ref: source.raw_sales
      transform: |
        SELECT
          region,
          COUNT(*) AS sale_count,
          CAST(SUM(amount) AS DECIMAL(10,2)) AS total_revenue,
          CAST(AVG(amount) AS DECIMAL(10,2)) AS avg_revenue
        FROM ref('source.raw_sales')
        GROUP BY region
      tags: ["silver", "analytics"]

validation:
  dag:
    expected_nodes: 2
    expected_edges:
      - [source.raw_sales, transform.regional_revenue]
  execution:
    success: true
  outputs:
    - node: transform.regional_revenue
      min_rows: 4

report_exposure_tests:
  # Test 1: Save exposure with valid cron schedule
  test_save_with_schedule:
    action: call_function
    module: seeknal.ask.agents.tools.save_report_exposure
    function: _do_save
    args:
      name: "weekly_revenue"
      prompt: "Summarize weekly revenue by region"
      inputs_json: '["transform.regional_revenue"]'
      output_format: "markdown"
      project_path: "{project_path}"
      schedule: "0 8 * * MON"
    validate:
      - file_exists: "seeknal/exposures/weekly_revenue.yml"
      - result_contains: "saved"
      - yaml_field: {path: "seeknal/exposures/weekly_revenue.yml", key: "schedule.cron", value: "0 8 * * MON"}

  # Test 2: Invalid cron format rejected (3 fields instead of 5)
  test_invalid_cron_fields:
    action: call_function
    module: seeknal.ask.agents.tools.save_report_exposure
    function: _do_save
    args:
      name: "bad_schedule"
      prompt: "test"
      inputs_json: "[]"
      output_format: "markdown"
      project_path: "{project_path}"
      schedule: "0 8 *"
    validate:
      - result_contains: "Error"
      - result_contains: "5-field"
      - file_not_exists: "seeknal/exposures/bad_schedule.yml"

  # Test 3: Empty schedule is OK (no schedule field written)
  test_empty_schedule_ok:
    action: call_function
    module: seeknal.ask.agents.tools.save_report_exposure
    function: _do_save
    args:
      name: "no_schedule_report"
      prompt: "Ad-hoc analysis"
      inputs_json: "[]"
      output_format: "markdown"
      project_path: "{project_path}"
      schedule: ""
    validate:
      - file_exists: "seeknal/exposures/no_schedule_report.yml"
      - result_contains: "saved"

  # Test 4: Validate exposure YAML with schedule passes validation
  test_exposure_schedule_validation_pass:
    action: call_function
    module: seeknal.ask.report.exposure
    function: _validate_report_exposure
    args:
      data:
        kind: exposure
        type: report
        name: "test_scheduled"
        sections:
          - title: "Test Section"
        schedule:
          cron: "0 8 * * MON"
          timezone: "US/Eastern"
      file_path: "test.yml"
    validate:
      - result_contains: "schedule"

  # Test 5: Validate exposure YAML without cron key fails
  test_exposure_schedule_missing_cron:
    action: call_function
    module: seeknal.ask.report.exposure
    function: _validate_report_exposure
    args:
      data:
        kind: exposure
        type: report
        name: "test_no_cron"
        sections:
          - title: "Test"
        schedule:
          timezone: "UTC"
      file_path: "test.yml"
    validate:
      - raises: ValueError
      - error_contains: "schedule.cron is required"

  # Test 6: Schedule as string (not dict) fails validation
  test_exposure_schedule_not_dict:
    action: call_function
    module: seeknal.ask.report.exposure
    function: _validate_report_exposure
    args:
      data:
        kind: exposure
        type: report
        name: "test_str_schedule"
        sections:
          - title: "Test"
        schedule: "0 8 * * MON"
      file_path: "test.yml"
    validate:
      - raises: ValueError
      - error_contains: "schedule must be a mapping"

  # Test 7: Cron with wrong number of fields fails
  test_exposure_cron_wrong_fields:
    action: call_function
    module: seeknal.ask.report.exposure
    function: _validate_report_exposure
    args:
      data:
        kind: exposure
        type: report
        name: "test_bad_cron"
        sections:
          - title: "Test"
        schedule:
          cron: "0 8 * *"
      file_path: "test.yml"
    validate:
      - raises: ValueError
      - error_contains: "5 fields"

  # Test 8: Exposure without schedule continues to work
  test_exposure_no_schedule_ok:
    action: call_function
    module: seeknal.ask.report.exposure
    function: _validate_report_exposure
    args:
      data:
        kind: exposure
        type: report
        name: "test_no_schedule"
        sections:
          - title: "Test"
      file_path: "test.yml"
    validate:
      - result_not_contains_error: true

  # Test 9: deploy_exposure raises when no schedule.cron
  test_deploy_exposure_missing_cron_raises:
    action: call_function
    module: seeknal.workflow.prefect_integration
    function: _execute_report
    args:
      project_path_str: "{project_path}"
      exposure_name: "nonexistent_report"
      config:
        sections:
          - title: "Test"
        schedule: {}
    validate:
      - result_contains: "status"

features_tested:
  - prefect_exposure_schedule_cron
  - prefect_exposure_schedule_timezone
  - prefect_save_exposure_with_schedule
  - prefect_invalid_cron_rejection
  - prefect_empty_schedule_ok
  - prefect_exposure_validation_with_schedule
  - prefect_schedule_missing_cron_fails
  - prefect_schedule_not_dict_fails
  - prefect_schedule_wrong_fields_fails
  - prefect_exposure_no_schedule_backwards_compat
  - prefect_deploy_exposure_api
